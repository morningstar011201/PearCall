<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — GhostCall</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    border-bottom: 1px solid #e5e5e5;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: #1a1a1a;
    font-weight: 600;
    font-size: 15px;
  }

  .back-link {
    font-size: 13px;
    color: #6b7280;
    text-decoration: none;
  }
  .back-link:hover { color: #1a1a1a; }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 4rem 2rem 5rem;
    flex: 1;
  }

  .page-title {
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    color: #6b7280;
    margin-bottom: 2.5rem;
    font-size: 14px;
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    margin-bottom: 0.4rem;
  }

  input, select, textarea {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #7c3aed;
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.08);
  }

  textarea {
    resize: vertical;
    min-height: 130px;
  }

  .btn {
    width: 100%;
    padding: 0.75rem;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    margin-top: 0.5rem;
  }

  .btn:hover { background: #6d28d9; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .success-box {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
  }

  .success-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }

  .success-box h2 {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .success-box p {
    color: #6b7280;
    font-size: 14px;
  }

  .error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 1rem;
  }

  footer {
    border-top: 1px solid #e5e5e5;
    padding: 1.5rem 2rem;
    text-align: center;
    font-size: 13px;
    color: #6b7280;
  }

  footer a { color: #7c3aed; text-decoration: none; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <svg width="22" height="26" viewBox="0 0 32 36" fill="none">
      <path d="M6 18C6 10.268 10.477 5 16 5C21.523 5 26 10.268 26 18V32C26 32 23 30 20 32C17 34 15 34 12 32C9 30 6 32 6 32V18Z" fill="#c8b8ff" opacity="0.92"/>
      <circle cx="12" cy="18" r="2.5" fill="#0a080f"/>
      <circle cx="20" cy="18" r="2.5" fill="#0a080f"/>
      <circle cx="13" cy="17" r="0.8" fill="#c8b8ff"/>
      <circle cx="21" cy="17" r="0.8" fill="#c8b8ff"/>
    </svg>
    GhostCall
  </a>
  <a href="/" class="back-link">← Back to home</a>
</nav>

<div class="container">
  <h1 class="page-title">Contact Us</h1>
  <p class="subtitle">Have feedback, a bug to report, or just want to say hi? We'd love to hear from you.</p>

  <div id="form-area">
    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="John Doe" required>
    </div>

    <div class="form-group">
      <label for="email">Your Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label for="type">Type</label>
      <select id="type">
        <option value="Feedback">Feedback</option>
        <option value="Bug Report">Bug Report</option>
        <option value="Feature Request">Feature Request</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" placeholder="Tell us what's on your mind..." required></textarea>
    </div>

    <button class="btn" id="submit-btn" onclick="submitForm()">Send Message</button>
    <div class="error-msg" id="error-msg">Something went wrong. Please try again.</div>
  </div>

  <div class="success-box" id="success-box">
    <div class="success-icon">✅</div>
    <h2>Message sent!</h2>
    <p>Thanks for reaching out. We'll get back to you soon.</p>
  </div>
</div>

<footer>
  © 2026 GhostCall ·
  <a href="/privacy">Privacy</a> ·
  <a href="/terms">Terms</a> ·
  <a href="/blog">Blog</a> ·
  <a href="/">Home</a>
</footer>

<script>
  async function submitForm() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const type = document.getElementById('type').value;
    const message = document.getElementById('message').value.trim();
    const btn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');

    if (!name || !email || !message) {
      errorMsg.textContent = 'Please fill in all fields.';
      errorMsg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending...';
    errorMsg.style.display = 'none';

    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          access_key: '6df4b8e5-cad1-4086-ad9a-1c842ca5af19', // 👈 Replace this
          subject: `GhostCall ${type} from ${name}`,
          name,
          email,
          message: `Type: ${type}\n\n${message}`,
          botcheck: ''
        })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-box').style.display = 'block';
      } else {
        throw new Error('Failed');
      }
    } catch (e) {
      errorMsg.textContent = 'Something went wrong. Please try again.';
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send Message';
    }
  }
</script>

</body>
</html>
